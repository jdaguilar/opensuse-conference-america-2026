# orchestration/airflow-values.yaml
# Helm overrides for Apache Airflow

executor: "LocalExecutor"

# Kubernetes connection used by @task functions that call the k8s API directly.
# _PIP_ADDITIONAL_REQUIREMENTS installs providers into every Airflow pod at
# startup (the apache/airflow image bundles cncf-kubernetes by default but
# not trino).
env:
  - name: AIRFLOW_CONN_KUBERNETES_DEFAULT
    value: "kubernetes://?extra=%7B%22in_cluster%22%3A+true%7D"
  - name: _PIP_ADDITIONAL_REQUIREMENTS
    value: "apache-airflow-providers-trino>=5.7.0"

ingress:
  apiServer:
    enabled: true

  web:
    enabled: true
    ingressClassName: traefik

    hosts:
      - name: airflow.localhost

dags:
  gitSync:
    enabled: true
    repo: https://github.com/jdaguilar/opensuse-conference-america-2026
    branch: main
    subPath: demo/opensuse/orchestration/dags

    sshKeySecret: ""
    knownHosts: ""

scheduler:
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

dagProcessor:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

triggerer:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

webserver:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi