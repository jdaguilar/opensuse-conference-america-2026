# observability/kube-prometheus-stack-values.yaml
# Helm values overrides for the kube-prometheus-stack
fullnameOverride: "prometheus-stack"

grafana:
  enabled: true
  adminPassword: "admin"
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.localhost

prometheus:
  prometheusSpec:
    # Ensure Prometheus watches all namespaces for ServiceMonitors and PodMonitors
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
