---
# PostgreSQL backend for Hive Metastore schema storage
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hive-metastore-postgresql
  namespace: data-query
  labels:
    app: hive-metastore-postgresql
    version: "1.0"
  annotations:
    kubernetes.io/description: "PostgreSQL backend for Hive Metastore"
spec:
  serviceName: hive-metastore-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: hive-metastore-postgresql
  template:
    metadata:
      labels:
        app: hive-metastore-postgresql
        version: "1.0"
    spec:
      containers:
        - name: postgresql
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              value: metastore
            - name: POSTGRES_USER
              value: hive
            - name: POSTGRES_PASSWORD
              value: hive
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: hive-metastore-postgresql
          version: "1.0"
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi

---
apiVersion: v1
kind: Service
metadata:
  name: hive-metastore-postgresql
  namespace: data-query
  labels:
    app: hive-metastore-postgresql
    version: "1.0"
  annotations:
    kubernetes.io/description: "PostgreSQL service for Hive Metastore"
spec:
  selector:
    app: hive-metastore-postgresql
  ports:
    - port: 5432
      targetPort: 5432

---
# hive-site.xml: metastore backend + warehouse location
apiVersion: v1
kind: ConfigMap
metadata:
  name: hive-metastore-config
  namespace: data-query
  labels:
    app: hive-metastore
    version: "1.0"
  annotations:
    kubernetes.io/description: "Hive Metastore configuration"
data:
  hive-site.xml: |
    <?xml version="1.0" encoding="UTF-8" standalone="no"?>
    <?xml-stylesheet type="text/xsl" href="configuration.xsl"?>
    <configuration>
      <!-- PostgreSQL backend -->
      <property>
        <name>javax.jdo.option.ConnectionURL</name>
        <value>jdbc:postgresql://hive-metastore-postgresql:5432/metastore</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionDriverName</name>
        <value>org.postgresql.Driver</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionUserName</name>
        <value>hive</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionPassword</name>
        <value>hive</value>
      </property>
      <!-- Warehouse points to Ozone curated bucket -->
      <property>
        <name>hive.metastore.warehouse.dir</name>
        <value>s3a://curated/warehouse/</value>
      </property>
      <!-- Allow DataNucleus to create tables; skip Hive version validation -->
      <property>
        <name>datanucleus.schema.autoCreateAll</name>
        <value>true</value>
      </property>
      <property>
        <name>hive.metastore.schema.verification</name>
        <value>false</value>
      </property>
      <property>
        <name>metastore.thrift.uris</name>
        <value>thrift://0.0.0.0:9083</value>
      </property>
      <property>
        <name>metastore.thrift.port</name>
        <value>9083</value>
      </property>
    </configuration>

  core-site.xml: |
    <?xml version="1.0" encoding="UTF-8" standalone="no"?>
    <?xml-stylesheet type="text/xsl" href="configuration.xsl"?>
    <configuration>
      <property>
        <name>fs.s3a.impl</name>
        <value>org.apache.hadoop.fs.s3a.S3AFileSystem</value>
      </property>
      <property>
        <name>fs.s3a.endpoint</name>
        <value>http://ozone-s3g-rest.data-storage.svc.cluster.local:9878</value>
      </property>
      <property>
        <name>fs.s3a.access.key</name>
        <value>hadoop</value>
      </property>
      <property>
        <name>fs.s3a.secret.key</name>
        <value>ozone</value>
      </property>
      <property>
        <name>fs.s3a.path.style.access</name>
        <value>true</value>
      </property>
      <property>
        <name>fs.s3a.aws.credentials.provider</name>
        <value>org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider</value>
      </property>
    </configuration>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive-metastore
  namespace: data-query
  labels:
    app: hive-metastore
    version: "1.0"
  annotations:
    kubernetes.io/description: "Hive Metastore standalone service for Trino Iceberg catalog"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hive-metastore
  template:
    metadata:
      labels:
        app: hive-metastore
        version: "1.0"
    spec:
      initContainers:
        - name: wait-for-postgresql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z hive-metastore-postgresql 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 3
              done
        - name: schema-init
          image: localhost:5000/hive-metastore:4.0.0
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              /opt/hive/bin/schematool -dbType postgres -initSchema --verbose 2>&1 | tail -3 \
              || echo "Schema may already exist, continuing."
          volumeMounts:
            - name: hive-config
              mountPath: /opt/hive/conf/hive-site.xml
              subPath: hive-site.xml
            - name: hive-config
              mountPath: /opt/hive/conf/core-site.xml
              subPath: core-site.xml
      containers:
        - name: metastore
          image: localhost:5000/hive-metastore:4.0.0
          imagePullPolicy: Always
          command:
            - /opt/hive/bin/hive
            - --service
            - metastore
          ports:
            - containerPort: 9083
              name: thrift
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: 9083
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: hive-config
              mountPath: /opt/hive/conf/hive-site.xml
              subPath: hive-site.xml
            - name: hive-config
              mountPath: /opt/hive/conf/core-site.xml
              subPath: core-site.xml
      volumes:
        - name: hive-config
          configMap:
            name: hive-metastore-config

---
apiVersion: v1
kind: Service
metadata:
  name: hive-metastore
  namespace: data-query
  labels:
    app: hive-metastore
    version: "1.0"
  annotations:
    kubernetes.io/description: "Thrift endpoint for Hive Metastore — used by Trino ozone_iceberg catalog"
spec:
  selector:
    app: hive-metastore
  ports:
    - port: 9083
      targetPort: 9083
      name: thrift
