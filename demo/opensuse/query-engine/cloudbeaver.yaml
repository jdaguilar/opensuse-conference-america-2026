# query-engine/cloudbeaver.yaml
# CloudBeaver — web-based SQL client for Trino and Hive Metastore PostgreSQL
#
# Access: http://cloudbeaver.localhost  (admin / admin)
#
# Connections must be added once via the UI (Database → New Connection).
# They persist in the PVC across pod restarts.
#
# Trino (ozone_iceberg):
#   Host:     trino.data-query.svc.cluster.local
#   Port:     8080
#   Database: ozone_iceberg
#   User:     admin    (no password)
#
# Hive Metastore DB (PostgreSQL):
#   Host:     hive-metastore-postgresql.data-query.svc.cluster.local
#   Port:     5432
#   Database: metastore
#   User:     hive
#   Password: hive

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cloudbeaver-workspace
  namespace: data-query
  labels:
    app: cloudbeaver
    version: "latest"
  annotations:
    kubernetes.io/description: "CloudBeaver workspace — persists shared connections across pod restarts"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudbeaver
  namespace: data-query
  labels:
    app: cloudbeaver
    version: "latest"
  annotations:
    kubernetes.io/description: "CloudBeaver web SQL client — Trino and Hive Metastore"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cloudbeaver
  template:
    metadata:
      labels:
        app: cloudbeaver
        version: "latest"
    spec:
      containers:
        - name: cloudbeaver
          image: dbeaver/cloudbeaver:latest
          ports:
            - containerPort: 8978
          env:
            - name: CB_ADMIN_NAME
              value: admin
            - name: CB_ADMIN_PASSWORD
              value: admin
          volumeMounts:
            - name: workspace
              mountPath: /opt/cloudbeaver/workspace
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 1
              memory: 768Mi
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: cloudbeaver-workspace

---
apiVersion: v1
kind: Service
metadata:
  name: cloudbeaver
  namespace: data-query
  labels:
    app: cloudbeaver
    version: "latest"
  annotations:
    kubernetes.io/description: "CloudBeaver web SQL client service"
spec:
  selector:
    app: cloudbeaver
  ports:
    - port: 80
      targetPort: 8978

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudbeaver-ingress
  namespace: data-query
  labels:
    app: cloudbeaver
    version: "latest"
  annotations:
    kubernetes.io/description: "CloudBeaver ingress via Traefik"
spec:
  ingressClassName: traefik
  rules:
    - host: cloudbeaver.localhost
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: cloudbeaver
                port:
                  number: 80
