# query-engine/cloudbeaver.yaml
# CloudBeaver — web-based SQL client for Trino and Hive Metastore PostgreSQL
#
# Access: http://cloudbeaver.localhost  (admin / admin)
# Pre-configured connections:
#   - Trino (ozone_iceberg catalog): trino.data-query.svc.cluster.local:8080
#   - Hive Metastore DB (PostgreSQL): hive-metastore-postgresql.data-query.svc.cluster.local:5432

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudbeaver-init
  namespace: data-query
  labels:
    app: cloudbeaver
    version: "latest"
  annotations:
    kubernetes.io/description: "CloudBeaver pre-configured data sources for Trino and Hive Metastore"
data:
  data-sources.json: |
    {
      "folders": {},
      "connections": {
        "trino-ozone-iceberg": {
          "provider": "generic",
          "driver": "generic:trino",
          "name": "Trino — ozone_iceberg",
          "save-password": false,
          "read-only": false,
          "configuration": {
            "host": "trino.data-query.svc.cluster.local",
            "port": "8080",
            "database": "ozone_iceberg",
            "auth-model": "native",
            "properties": {
              "@user": "admin"
            }
          }
        },
        "hive-metastore-postgres": {
          "provider": "postgresql",
          "driver": "postgresql:postgresql",
          "name": "Hive Metastore DB",
          "save-password": true,
          "read-only": false,
          "configuration": {
            "host": "hive-metastore-postgresql.data-query.svc.cluster.local",
            "port": "5432",
            "database": "metastore",
            "auth-model": "native",
            "properties": {
              "@user": "hive",
              "@password": "hive"
            }
          }
        }
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudbeaver
  namespace: data-query
  labels:
    app: cloudbeaver
    version: "latest"
  annotations:
    kubernetes.io/description: "CloudBeaver web SQL client — Trino and Hive Metastore"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudbeaver
  template:
    metadata:
      labels:
        app: cloudbeaver
        version: "latest"
    spec:
      initContainers:
        - name: init-workspace
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /workspace/GlobalConfiguration/.dbeaver
              cp /init/data-sources.json /workspace/GlobalConfiguration/.dbeaver/data-sources.json
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: init-config
              mountPath: /init
      containers:
        - name: cloudbeaver
          image: dbeaver/cloudbeaver:latest
          ports:
            - containerPort: 8978
          env:
            - name: CB_ADMIN_NAME
              value: admin
            - name: CB_ADMIN_PASSWORD
              value: admin
          volumeMounts:
            - name: workspace
              mountPath: /opt/cloudbeaver/workspace
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 1
              memory: 768Mi
      volumes:
        - name: workspace
          emptyDir: {}
        - name: init-config
          configMap:
            name: cloudbeaver-init

---
apiVersion: v1
kind: Service
metadata:
  name: cloudbeaver
  namespace: data-query
  labels:
    app: cloudbeaver
    version: "latest"
  annotations:
    kubernetes.io/description: "CloudBeaver web SQL client service"
spec:
  selector:
    app: cloudbeaver
  ports:
    - port: 80
      targetPort: 8978

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudbeaver-ingress
  namespace: data-query
  labels:
    app: cloudbeaver
    version: "latest"
  annotations:
    kubernetes.io/description: "CloudBeaver ingress via Traefik"
spec:
  ingressClassName: traefik
  rules:
    - host: cloudbeaver.localhost
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: cloudbeaver
                port:
                  number: 80
