# query-engine/trino-values.yaml
# Helm configuration for Trino querying Apache Iceberg on Ozone

server:
  workers: 2

additionalCatalogs:
  ozone_iceberg: |-
    connector.name=iceberg
    hive.metastore.uri=thrift://hive-metastore:9083
    iceberg.file-format=PARQUET
    # Assuming Ozone S3Gateway is used
    fs.native-s3.enabled=true
    s3.endpoint=http://ozone-s3g:9878
    s3.region=us-east-1
    s3.path-style-access=true
